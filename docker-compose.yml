services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: valuhire
      POSTGRES_PASSWORD: valuhire
      POSTGRES_DB: valuhire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valuhire -d valuhire"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.example
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./prisma:/app/prisma

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web

  runner:
    build:
      context: .
      dockerfile: services/runner/Dockerfile
    env_file:
      - .env.example
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./services/runner:/app/services/runner
      - ./prisma:/app/prisma
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
